name: Daily Actuarial News Update

on:
  schedule:
    # 7:00 AM America/Chicago during daylight saving time = 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news crawler
        run: python crawler.py

      - name: Commit updated data
        run: |
          git config user.name "actuarial-dashboard-bot"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "Update actuarial news data" || echo "No changes to commit"
          git push
