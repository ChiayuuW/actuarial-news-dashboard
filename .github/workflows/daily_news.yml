name: Daily Actuarial News Update

on:
  schedule:
    # 7:00 AM America/Chicago is usually 12:00 UTC during daylight time, 13:00 UTC during standard time.
    # Adjust if needed.
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python crawler.py
      - name: Commit updated data
        run: |
          git config user.name "actuarial-dashboard-bot"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "Update actuarial news data" || echo "No changes"
          git push
