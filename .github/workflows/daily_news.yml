name: Daily Actuarial News Update

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news and job crawler
        run: python crawler.py
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}

      - name: Commit updated data
        run: |
          git config user.name "actuarial-dashboard-bot"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "Update actuarial news and job data" || echo "No changes to commit"
          git push
